services:
  redis:
    image: redis:7-alpine
    container_name: enel-redis
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile.api
    image: enel-api:latest
    container_name: enel-api
    working_dir: /app
    volumes:
      - ../data:/app/data:rw
    environment:
      ENEL_UI: react
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-hashing}
      RAG_CHROMADB_PATH: /app/data/rag/chromadb
      RAG_TELEMETRY_PATH: /app/data/rag/telemetry.jsonl
      RAG_FEEDBACK_PATH: /app/data/rag/feedback.csv
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: infra/dockerfiles/web.Dockerfile
    image: enel-web:latest
    container_name: enel-web
    ports:
      - "127.0.0.1:5173:8080"
    depends_on:
      - api
    restart: unless-stopped

  streamlit:
    build:
      context: ..
      dockerfile: infra/dockerfiles/streamlit.Dockerfile
    image: enel-streamlit-dashboard:latest
    container_name: enel-streamlit
    working_dir: /app
    volumes:
      # Live mount so dashboard edits reflect on reload (Streamlit watches files).
      - ../apps:/app/apps:ro
      - ../src:/app/src:ro
      # ChromaDB opens SQLite with write access even for reads, and the chat
      # persists telemetry/feedback under data/rag.
      - ../data:/app/data:rw
    environment:
      ENEL_PROJECT_ROOT: /app
      ENEL_UI: streamlit
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-hashing}
      RAG_CHROMADB_PATH: /app/data/rag/chromadb
      RAG_TELEMETRY_PATH: /app/data/rag/telemetry.jsonl
      RAG_FEEDBACK_PATH: /app/data/rag/feedback.csv
      RAG_PROVIDER: llama_cpp
      RAG_MODEL_FILE: qwen2.5-3b-instruct-q4_k_m.gguf
      RAG_MODEL_PATH: /app/data/rag/models/qwen2.5-3b-instruct-q4_k_m.gguf
      RAG_N_CTX: "4096"
      RAG_N_THREADS: "6"
      RAG_SIMILARITY_THRESHOLD: "0.05"
    ports:
      - "127.0.0.1:8501:8501"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: enel-caddy
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "8080:8080"
    depends_on:
      - web
      - api
      - streamlit
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: enel-cloudflared
    command: tunnel --no-autoupdate --url http://caddy:8080
    depends_on:
      - caddy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
