services:
  minio:
    profiles: ["dev", "full", "ml"]
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${ENEL_MINIO_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${ENEL_MINIO_SECRET_KEY:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    profiles: ["dev", "full", "ml"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${ENEL_POSTGRES_USER:-enel}
      POSTGRES_PASSWORD: ${ENEL_POSTGRES_PASSWORD:-enel123}
      POSTGRES_DB: ${ENEL_POSTGRES_DATABASE:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ENEL_POSTGRES_USER:-enel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  nessie:
    profiles: ["dev", "full"]
    image: projectnessie/nessie:0.80.0
    environment:
      NESSIE_VERSION_STORE_TYPE: JDBC
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/nessie
      QUARKUS_DATASOURCE_USERNAME: ${ENEL_POSTGRES_USER:-enel}
      QUARKUS_DATASOURCE_PASSWORD: ${ENEL_POSTGRES_PASSWORD:-enel123}
    ports:
      - "19120:19120"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  minio_data:
  postgres_data:
