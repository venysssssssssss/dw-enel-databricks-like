include:
  - docker-compose.dev.yml

services:
  api:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      ENEL_TRINO_HOST: trino
      ENEL_TRINO_PORT: 8080
      ENEL_TRINO_SCHEMA: gold
      ENEL_MINIO_ENDPOINT: minio:9000
      ENEL_SECRET_KEY: ${ENEL_SECRET_KEY:-replace-me}
    depends_on:
      minio:
        condition: service_healthy
      trino:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M

  superset:
    profiles: ["full"]
    image: apache/superset:4.0.1
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-changeme}
      DATABASE_URL: postgresql://enel:enel123@postgres:5432/superset
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
    volumes:
      - ./config/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
